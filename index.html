<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon's mail</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/tablet.css">

    <script src="https://kit.fontawesome.com/c4ab95abda.js" crossorigin="anonymous"></script>
</head>
<body>
    
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">Send pigeon</a></li>
        </ul>
        <a href=""><i class="fa-solid fa-circle-user"></i></a>
    </nav>   

    <header>
        <h1>Pigeon's Mail</h1>
        <img src="img/header-image.png" alt="image principale du site">

        <ul>
            <li><a href="javascript:void(0)" class="btn-to-section" data-target="s1">Discover</a></li>
            <li><a href="#">Send Pigeon</a></li>
        </ul>

    </header>

    <main>
        <section id="s1"></section>
        <section></section>
    </main>


    <script>
        const btn_to_section = document.querySelectorAll('.btn-to-section');

        // ─── Clic sur les dots ───
        btn_to_section.forEach(btn_to_section => {
            btn_to_section.addEventListener('click', (e) => {
                e.preventDefault(); // empêche href="#" de remonter en haut
                document.getElementById(btn_to_section.dataset.target).scrollIntoView({ behavior: 'smooth' });
            });
        });
  </script>
</body>
</html>
