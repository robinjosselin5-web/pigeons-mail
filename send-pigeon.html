<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon's mail</title>

    <!-- Mobile first : style.css (base + mobile), puis tablet, puis desktop -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/form.css">
    <link rel="stylesheet" href="css/tablet.css">
    <link rel="stylesheet" href="css/desktop.css">

    <script src="https://kit.fontawesome.com/c4ab95abda.js" crossorigin="anonymous"></script>
</head>
<body>
    
    <div data-include="component/navbar.html"></div>

    <header>
        <h1>Pigeon's Mail</h1>
        <img src="img/header-image.png" alt="image principale du site">

        <ul>
            <!-- <li><a href="javascript:void(0)" class="btn-to-section" data-target="s1">Discover</a></li> -->
            <li class="btn-low-green"><a href="#form" class="btn-to-section" data-target="s1">Send Pigeon</a></li>
        </ul>

    </header>

    <main>
        <section id="form">
            <article>
                <h2>Your ID</h2>
                <form action="">
                    <input type="text" placeholder="Name">
                    <input type="email" placeholder="Email">
                </form>
            </article>
            <article>
                <h2>Where pigeon go</h2>
                    <form action="">
                        <input type="text" placeholder="Name">
                        <input type="text" placeholder="Adress">
                        
                        <select name="country" id="country">
                            <option value="">Country</option>
                            <option value="dog">France</option>
                            <option value="cat">Spain</option>
                            <option value="hamster">Italia</option>
                            <option value="parrot">Deutchland</option>
                            <option value="spider">Swiss</option>
                            <option value="goldfish">Belgium</option>
                        </select>
                    </form>
            </article>
            <article>
                <h2>Your message</h2>
                <textarea name="Message" id="message">
                    Your Message
                </textarea>
            </article>
            <article>
                <button>Send It !</button>  
            </article>
        </section>        
    </main>

    <div data-include="component/footer.html"></div>

    <script src="js/app.js"></script>
</body>
</html>
